<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tokimahery RAMAROZAKA | All courses</title>
    <link rel="stylesheet" href="./dist/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <header
      class="flex justify-between items-center py-4 bg-red-dark **:text-white"
    >
      <div>
        <a href="index.html">
          <img
            src="assets/logo.png"
            class="w-48 cursor-pointer px-3"
            alt="Logo de Tokimahery Ramarozaka"
          />
        </a>
      </div>
      <nav>
        <ul
          class="flex gap-12 **:text-[0.9rem] [&_li]:flex [&_li]:flex-col [&_li]:items-center [&_li>hr]:w-0 [&_li]:hover:[&>hr]:w-full [&_li>hr]:transition-all"
        >
          <li>
            <a href="index.html">HOME</a>
            <hr />
          </li>
          <li>
            <a href="#">BLOG</a>
            <hr />
          </li>
          <li>
            <a href="courses.html">COURSES</a>
            <hr />
          </li>
          <li>
            <a href="#">TESTIMONIALS</a>
            <hr />
          </li>
          <li>
            <a href="#">RESEARCH</a>
            <hr />
          </li>
        </ul>
      </nav>
      <div class="pr-8 flex gap-2">
        <input type="text" placeholder="Search anything..." />
        <i class="fa-solid fa-basket-shopping text-[1.7rem]"></i>
      </div>
    </header>

    <section>
      <main class="flex flex-col gap-4 items-center py-20 bg-bg-warm">
        <div
          class="flex items-center gap-4 [&_hr]:border-0 [&_hr]:h-0.5 [&_hr]:w-12 [&_hr]:bg-red-dark"
        >
          <hr />
          <span class="text-[0.9rem] text-text-light">LEARNING</span>
          <hr />
        </div>
        <h1 class="text-text-dark font-semibold font-Playfair text-6xl">
          All <span class="text-red italic">courses</span>
        </h1>
        <p class="text-text-light text-center mt-2 w-3/12">
          Online and offline courses across development, translation, and
          research. Find the one that fits your level and goals.
        </p>
      </main>

      <section
        class="flex justify-between [&_h3]:text-text-light [&_h3]:text-[0.8rem] [&>div]:flex [&>div]:flex-col [&>div]:gap-3 px-16 py-8 rounded-3xl bg-bg-warm mt-4 mx-24"
      >
        <div>
          <h3>LANGUAGE</h3>
          <div class="**:w-5 flex gap-2">
            <img
              src="assets/drapeau_madagscar.png"
              alt="drapeau de Madagascar"
            />
            <img src="assets/drapeau_france.png" alt="drapeau de france" />
            <img
              src="assets/drapeau_etat-unis.png"
              alt="drapeau des etat-unis"
            />
          </div>
        </div>
        <div>
          <h3>TECHNOLOGY</h3>
          <select
            name="technology"
            id=""
            class="bg-bg-white py-2 px-2 rounded-xl"
          >
            <option value="">All technologies</option>
            <option value="">JavaScript</option>
            <option value="">Java</option>
            <option value="">Python</option>
            <option value="">PHP</option>
          </select>
        </div>
        <div>
          <h3>LEVEL</h3>
          <select name="level" id="" class="bg-bg-white py-2 px-2 rounded-xl">
            <option value="">All levels</option>
            <option value="">Beginner</option>
            <option value="">Intermediate</option>
            <option value="">Advanced</option>
          </select>
        </div>
        <div>
          <div class="flex gap-3 items-center">
            <h3>PRICE RANGE</h3>
            <div class="flex gap-1 **:text-red-dark **:text-[0.9rem]">
              <span>0</span>
              <span>Ar</span>
              <span>~</span>
              <span>300,000</span>
              <span>Ar</span>
            </div>
          </div>
          <div class="flex flex-col **:accent-red">
            <input type="range" />
            <input type="range" />
          </div>
        </div>
        <div>
          <h3>SEARCH</h3>
          <input
            type="text"
            class="bg-bg-white rounded-xl px-4 w-60 py-1"
            placeholder="Keywords..."
          />
        </div>
        <div class="mt-7">
          <span class="text-[0.9rem] text-text-light">CLEAR ALL</span>
        </div>
      </section>
    </section>

    <section
      id="courses_section"
      class="grid grid-cols-4 gap-12 px-28 mt-8"
    ></section>
    <script src="main.js"></script>
  </body>
</html>
